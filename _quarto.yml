project:
  title: "Affect Similarity Project"
  type: default
  output-dir: outputs
author: "Geert Van Dingenen"

# APA references and bibliography
bibliography: references.bib
csl: apa.csl

# GLOBAL SETTINGS
date: last-modified
format:
  html:
    theme: cosmo          
    toc: true             
    toc-location: left
    css: project.css
    toc-depth: 4
    number-sections: true 
    code-fold: true       
    code-tools: true      
    df-print: paged       
    embed-resources: true  # contain all into one html file
editor: visual
filters:
  - collapse-output
execute:
  warning: false
  message: false